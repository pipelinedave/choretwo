name: Deploy to Staging

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:

env:
  STAGING_DOMAIN: choretwo-staging.stillon.top

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get commit SHA from build workflow
        id: get-sha
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to k3s-config
        uses: ./.github/workflows/update-kubernetes-deployment.yml
        with:
          overlay: "staging"
          version_tag: ${{ steps.get-sha.outputs.sha }}
        secrets:
          K3S_CONFIG_TOKEN: ${{ secrets.K3S_CONFIG_TOKEN }}

  e2e-staging:
    name: E2E Tests on Staging
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: staging
    if: github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for deployment
        run: |
          echo "Waiting 5 minutes for Flux to deploy..."
          sleep 300

      - name: Set up Node.js
        uses: setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install Playwright
        run: |
          cd frontend
          npm ci
          npx playwright install --with-deps

      - name: Run E2E tests against staging
        run: |
          cd frontend
          BASE_URL=https://${{ env.STAGING_DOMAIN }} npm run test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-staging-report
          path: frontend/playwright-report/

  notify-staging-deploy:
    name: Notify Staging Deployment
    runs-on: ubuntu-latest
    needs: [deploy-staging, e2e-staging]
    if: always()
    steps:
      - name: Deployment status
        run: |
          if [ "${{ needs.deploy-staging.result }}" == "success" ]; then
            echo "✅ Staging deployment successful!"
            echo "URL: https://${{ env.STAGING_DOMAIN }}"
          else
            echo "❌ Staging deployment failed"
            echo "Deploy result: ${{ needs.deploy-staging.result }}"
            echo "E2E result: ${{ needs.e2e-staging.result }}"
          fi
