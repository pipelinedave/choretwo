name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  STAGING_DOMAIN: choretwo-staging.stillon.top

jobs:
  build-and-push:
    name: Build and Push All Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: auth-service
            context: ./services/auth-service
            dockerfile: ./services/auth-service/Dockerfile
          - name: chore-service
            context: ./services/chore-service
            dockerfile: ./services/chore-service/Dockerfile
          - name: log-service
            context: ./services/log-service
            dockerfile: ./services/log-service/Dockerfile
          - name: notification-service
            context: ./services/notification-service
            dockerfile: ./services/notification-service/Dockerfile
          - name: ai-copilot-service
            context: ./services/ai-copilot-service
            dockerfile: ./services/ai-copilot-service/Dockerfile
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile.prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            pipelinedave/${{ matrix.service.name }}:${{ github.sha }}
            pipelinedave/${{ matrix.service.name }}:latest

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flux CLI
        uses: fluxcd/flux2/action@main
        with:
          version: latest

      - name: Deploy to k3s-config
        uses: ./.github/workflows/update-kubernetes-deployment.yml
        with:
          overlay: "staging"
          version_tag: ${{ github.sha }}
        secrets:
          K3S_CONFIG_TOKEN: ${{ secrets.K3S_CONFIG_TOKEN }}

  e2e-staging:
    name: E2E Tests on Staging
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: staging
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for deployment
        run: |
          echo "Waiting 5 minutes for Flux to deploy..."
          sleep 300

      - name: Set up Node.js
        uses: setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install Playwright
        run: |
          cd frontend
          npm ci
          npx playwright install --with-deps

      - name: Run E2E tests against staging
        run: |
          cd frontend
          BASE_URL=https://${{ env.STAGING_DOMAIN }} npm run test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-staging-report
          path: frontend/playwright-report/

  notify-staging-deploy:
    name: Notify Staging Deployment
    runs-on: ubuntu-latest
    needs: [deploy-staging, e2e-staging]
    if: always()
    steps:
      - name: Deployment status
        run: |
          if [ "${{ needs.deploy-staging.result }}" == "success" ] && [ "${{ needs.e2e-staging.result }}" == "success" ]; then
            echo "✅ Staging deployment successful!"
            echo "URL: https://${{ env.STAGING_DOMAIN }}"
          else
            echo "❌ Staging deployment failed"
            echo "Deploy result: ${{ needs.deploy-staging.result }}"
            echo "E2E result: ${{ needs.e2e-staging.result }}"
          fi
