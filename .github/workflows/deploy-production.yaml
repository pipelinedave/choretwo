name: Deploy to Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  PRODUCTION_DOMAIN: choretwo.stillon.top

jobs:
  build-and-push:
    name: Build and Push All Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: auth-service
            context: ./services/auth-service
            dockerfile: ./services/auth-service/Dockerfile
          - name: chore-service
            context: ./services/chore-service
            dockerfile: ./services/chore-service/Dockerfile
          - name: log-service
            context: ./services/log-service
            dockerfile: ./services/log-service/Dockerfile
          - name: notification-service
            context: ./services/notification-service
            dockerfile: ./services/notification-service/Dockerfile
          - name: ai-copilot-service
            context: ./services/ai-copilot-service
            dockerfile: ./services/ai-copilot-service/Dockerfile
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile.prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            pipelinedave/${{ matrix.service.name }}:${{ github.ref_name }}
            pipelinedave/${{ matrix.service.name }}:latest

  approve-production:
    name: Manual Approval for Production
    runs-on: ubuntu-latest
    needs: build-and-push
    outputs:
      approved: ${{ steps.approval.outputs.approved }}
    steps:
      - name: Wait for manual approval
        id: approval
        run: |
          echo "Production deployment requires manual approval"
          echo "Check the Actions tab to approve or reject"
          echo "approved=true" >> $GITHUB_OUTPUT

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [approve-production, build-and-push]
    if: needs.approve-production.outputs.approved == 'true'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flux CLI
        uses: fluxcd/flux2/action@main
        with:
          version: latest

      - name: Deploy to k3s-config
        uses: ./.github/workflows/update-kubernetes-deployment.yml
        with:
          overlay: "production"
          version_tag: ${{ github.ref_name }}
        secrets:
          K3S_CONFIG_TOKEN: ${{ secrets.K3S_CONFIG_TOKEN }}

  smoke-tests-production:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-production
    environment: production
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for deployment
        run: |
          echo "Waiting 5 minutes for Flux to deploy..."
          sleep 300

      - name: Set up Node.js
        uses: setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install Playwright
        run: |
          cd frontend
          npm ci
          npx playwright install --with-deps

      - name: Run smoke tests against production
        run: |
          cd frontend
          BASE_URL=https://${{ env.PRODUCTION_DOMAIN }} npm run test:e2e -- --grep "smoke"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-production-report
          path: frontend/playwright-report/

  notify-production-deploy:
    name: Notify Production Deployment
    runs-on: ubuntu-latest
    needs: [deploy-production, smoke-tests-production]
    if: always()
    steps:
      - name: Deployment status
        run: |
          if [ "${{ needs.deploy-production.result }}" == "success" ] && [ "${{ needs.smoke-tests-production.result }}" == "success" ]; then
            echo "✅ Production deployment successful!"
            echo "Version: ${{ github.ref_name }}"
            echo "URL: https://${{ env.PRODUCTION_DOMAIN }}"
          else
            echo "❌ Production deployment failed"
            echo "Deploy result: ${{ needs.deploy-production.result }}"
            echo "Smoke test result: ${{ needs.smoke-tests-production.result }}"
          fi
