name: Build and Push Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  DOCKER_REGISTRY: pipelinedave
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  build-and-push:
    name: Build and Push ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: auth-service
            context: ./services/auth-service
            dockerfile: ./services/auth-service/Dockerfile
          - name: chore-service
            context: ./services/chore-service
            dockerfile: ./services/chore-service/Dockerfile
          - name: log-service
            context: ./services/log-service
            dockerfile: ./services/log-service/Dockerfile
          - name: notification-service
            context: ./services/notification-service
            dockerfile: ./services/notification-service/Dockerfile
          - name: ai-copilot-service
            context: ./services/ai-copilot-service
            dockerfile: ./services/ai-copilot-service/Dockerfile
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile.prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.DOCKER_REGISTRY }}/${{ matrix.service.name }}:latest
          cache-from: type=registry,ref=${{ env.DOCKER_REGISTRY }}/${{ matrix.service.name }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_REGISTRY }}/${{ matrix.service.name }}:buildcache,mode=max

  notify-build-complete:
    name: Notify Build Complete
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Send notification (placeholder)
        run: |
          echo "All services built and pushed successfully"
          echo "Images available at:"
          echo "  - ${{ env.DOCKER_REGISTRY }}/auth-service:${{ github.sha }}"
          echo "  - ${{ env.DOCKER_REGISTRY }}/chore-service:${{ github.sha }}"
          echo "  - ${{ env.DOCKER_REGISTRY }}/log-service:${{ github.sha }}"
          echo "  - ${{ env.DOCKER_REGISTRY }}/notification-service:${{ github.sha }}"
          echo "  - ${{ env.DOCKER_REGISTRY }}/ai-copilot-service:${{ github.sha }}"
          echo "  - ${{ env.DOCKER_REGISTRY }}/frontend:${{ github.sha }}"
