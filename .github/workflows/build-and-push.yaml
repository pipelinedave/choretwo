name: Build and Push Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  DOCKER_REGISTRY: pipelinedave
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  build-and-push:
    name: Build and Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: auth-service
            context: ./services/auth-service
          - name: chore-service
            context: ./services/chore-service
          - name: log-service
            context: ./services/log-service
          - name: notification-service
            context: ./services/notification-service
          - name: ai-copilot-service
            context: ./services/ai-copilot-service
          - name: choretwo-frontend
            context: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_REGISTRY }}/${{ matrix.service.name }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_REGISTRY }}/${{ matrix.service.name }}:buildcache,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            BUILD_VERSION=${{ github.sha }}

      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

  notify-build-complete:
    name: Notify Build Complete
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Send notification (placeholder)
        run: |
          echo "All services built and pushed successfully"
          echo "Images available at:"
          echo "  - ${{ env.DOCKER_REGISTRY }}/auth-service:${{ github.sha }}"
          echo "  - ${{ env.DOCKER_REGISTRY }}/chore-service:${{ github.sha }}"
          echo "  - ${{ env.DOCKER_REGISTRY }}/log-service:${{ github.sha }}"
          echo "  - ${{ env.DOCKER_REGISTRY }}/notification-service:${{ github.sha }}"
          echo "  - ${{ env.DOCKER_REGISTRY }}/ai-copilot-service:${{ github.sha }}"
          echo "  - ${{ env.DOCKER_REGISTRY }}/choretwo-frontend:${{ github.sha }}"
